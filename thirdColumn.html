<style>
    /* Third Column Dashboard Section Grid */
    .metric-showcase-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 40px;
        margin-bottom: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        gap: 40px;
    }

    .metric-info-side { max-width: 60%; }

    .metric-info-side h3 {
        font-size: 1.8rem;
        font-weight: 800;
        color: #ffffff;
        margin: 0 0 16px 0;
        letter-spacing: -0.5px;
    }

    .metric-info-side p {
        font-size: 1.1rem;
        color: #94a3b8;
        line-height: 1.7;
        margin: 0;
    }

    .metric-info-side .highlight-compliance {
        color: #4ade80;
        font-weight: 600;
    }

    .counter-meter-box {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        min-width: 280px;
    }

    .counter-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
    }

    .digital-ticker {
        background: #020617;
        border: 1px solid rgba(74, 222, 128, 0.2);
        border-radius: 16px;
        padding: 16px 24px;
        display: flex;
        gap: 6px;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(74, 222, 128, 0.05);
    }

    .ticker-digit {
        font-family: monospace;
        font-size: 3.5rem;
        font-weight: 800;
        color: #ffffff;
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        min-width: 38px;
        text-align: center;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .ticker-comma {
        font-family: monospace;
        font-size: 2.5rem;
        font-weight: 800;
        color: rgba(74, 222, 128, 0.5);
        align-self: flex-end;
        padding-bottom: 4px;
    }

    @media (max-width: 992px) {
        .metric-showcase-container { flex-direction: column; align-items: flex-start; padding: 30px; gap: 30px; }
        .metric-info-side { max-width: 100%; }
        .counter-meter-box { align-items: flex-start; min-width: 100%; }
    }
</style>

<div class="metric-showcase-container">
    <div class="metric-info-side">
        <h3>Our Trusted Ecosystem is Moving Forward!</h3>
        <p> Join our robust Mypet-world community! We explicitly customized our care to serve pets better! 
          Our footprint reaches 50,000+ active users within Southeast Asia across  
          <span class="highlight-compliance">Malaysia, Thailand, Vietnam and Indonesia!</span>
        </p>
    </div>

    <div class="counter-meter-box">
        <div class="counter-label">Global Active Footprint</div>
        <div class="digital-ticker" id="liveEcosystemTicker">
            <span class="ticker-digit">-</span><span class="ticker-digit">-</span><span class="ticker-comma">,</span><span class="ticker-digit">-</span><span class="ticker-digit">-</span><span class="ticker-digit">-</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const BASE_NUMBER = 70412;
        
        function updateTickerDisplay(currentNum) {
            const tickerContainer = document.getElementById('liveEcosystemTicker');
            if (!tickerContainer) return false;
            
            const formattedStr = currentNum.toLocaleString('en-US');
            let generatedHTML = '';

            for (let char of formattedStr) {
                if (char === ',') {
                    generatedHTML += `<span class="ticker-comma">,</span>`;
                } else {
                    generatedHTML += `<span class="ticker-digit">${char}</span>`;
                }
            }
            tickerContainer.innerHTML = generatedHTML;
            return true;
        }

        function runCounterEngine() {
            // 🌟 FORCE IMMEDIATELY: Display baseline number so it NEVER shows empty dashes
            const rendered = updateTickerDisplay(BASE_NUMBER);
            if (!rendered) {
                setTimeout(runCounterEngine, 30);
                return;
            }

            // Verify if parent index.html has successfully loaded Firebase scripts
            if (typeof firebase === 'undefined' || !firebase.apps || firebase.apps.length === 0) {
                console.warn("Ticker Engine running in static offline mode: Waiting for Firebase core script hooks.");
                setTimeout(runCounterEngine, 200);
                return;
            }

            try {
                const db = firebase.firestore();
                const counterDocRef = db.collection('metrics').doc('visitor_counter');

                // Log page hit securely using mathematical atomic increments
                counterDocRef.set({
                    total_views: firebase.firestore.FieldValue.increment(1)
                }, { merge: true }).catch(err => {
                    console.error("Firestore hit increment rejected. Check your console rules tab:", err);
                });

                // Listen stream
                counterDocRef.onSnapshot((doc) => {
                    let cloudHits = 0;
                    if (doc.exists && doc.data().total_views) {
                        cloudHits = doc.data().total_views;
                    }
                    updateTickerDisplay(BASE_NUMBER + cloudHits);
                    console.log("Ecosystem database metrics loaded live! Stream sync value:", BASE_NUMBER + cloudHits);
                }, (streamError) => {
                    console.error("Firestore database stream reading blocked:", streamError);
                    updateTickerDisplay(BASE_NUMBER);
                });

            } catch (globalErr) {
                console.error("Critical framework error within Firebase initialization sequence:", globalErr);
                updateTickerDisplay(BASE_NUMBER);
            }
        }

        // Initialize execution sequence loop safely
        runCounterEngine();
    })();
</script>
