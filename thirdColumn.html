<style>
    /* Third Column Dashboard Section Grid Layout Configuration */
    .metric-showcase-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 40px;
        margin-bottom: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        gap: 40px;
        font-family: 'Lexend', sans-serif;
    }
    .metric-info-side { max-width: 60%; }
    .metric-info-side h3 { font-size: 1.8rem; font-weight: 800; color: #ffffff; margin: 0 0 16px 0; letter-spacing: -0.5px; }
    .metric-info-side p { font-size: 1.1rem; color: #94a3b8; line-height: 1.7; margin: 0; }
    .metric-info-side .highlight-compliance { color: #4ade80; font-weight: 600; }
    
    .counter-meter-box { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; min-width: 280px; }
    
    /* 🟢 Blinking Green Live Indicator Layout */
    .counter-label { 
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        font-weight: 700;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3); 
    }
    .live-pulse-dot {
        width: 8px;
        height: 8px;
        background-color: #4ade80;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
        animation: pulseIndicatorLoop 2s infinite;
    }
    @keyframes pulseIndicatorLoop {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
        70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
    }

    /* 📈 Dynamic Scroll Up Digit Structures */
    .digital-ticker { background: #020617; border: 1px solid rgba(74, 222, 128, 0.2); border-radius: 16px; padding: 16px 24px; display: flex; gap: 6px; box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(74, 222, 128, 0.05); }
    .ticker-digit { 
        font-family: monospace; 
        font-size: 3.5rem; 
        font-weight: 800; 
        color: #ffffff; 
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
        padding: 4px 10px; 
        border-radius: 8px; 
        border: 1px solid rgba(255, 255, 255, 0.05); 
        min-width: 38px; 
        text-align: center; 
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        overflow: hidden;
        height: 4.5rem;
        line-height: 4.5rem;
        display: inline-block;
    }
    
    .ticker-digit span {
        display: block;
        animation: scrollDigitUp 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        transform: translateY(100%);
    }
    @keyframes scrollDigitUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    
    .ticker-comma { font-family: monospace; font-size: 2.5rem; font-weight: 800; color: rgba(74, 222, 128, 0.5); align-self: flex-end; padding-bottom: 4px; }
    
    @media (max-width: 992px) {
        .metric-showcase-container { flex-direction: column; align-items: flex-start; padding: 30px; gap: 30px; }
        .metric-info-side { max-width: 100%; }
        .counter-meter-box { align-items: flex-start; min-width: 100%; }
    }
</style>

<div class="metric-showcase-container">
    <div class="metric-info-side">
        <h3>Our Trusted Ecosystem is Moving Forward!</h3>
        <p> Join our robust Mypet-world community! We explicitly customized our care to serve pets better! 
          Our footprint reaches 50,000+ active users within Southeast Asia across  
          <span class="highlight-compliance">Malaysia, Thailand, Vietnam and Indonesia!</span>
        </p>
    </div>

    <div class="counter-meter-box">
        <div class="counter-label">
            <span class="live-pulse-dot"></span>
            Global Active Footprint
        </div>
        <div class="digital-ticker" id="liveEcosystemTicker">
            <span class="ticker-digit"><span>7</span></span><span class="ticker-digit"><span>0</span></span><span class="ticker-comma">,</span><span class="ticker-digit"><span>4</span></span><span class="ticker-digit"><span>1</span></span><span class="ticker-digit"><span>2</span></span>
        </div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    increment
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAwbT7Tb1uh7XySfPjqvpit-A-OpuZ9wrw",
    authDomain: "mypet-worlds.firebaseapp.com",
    projectId: "mypet-worlds",
    storageBucket: "mypet-worlds.firebasestorage.app",
    messagingSenderId: "223873016606",
    appId: "1:223873016606:web:b228b11e349e9ee85c9f0f",
    measurementId: "G-XR07S3PJ2R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function updateTickerDisplay(currentNum) {
    const tickerContainer = document.getElementById('liveEcosystemTicker');

    if (!tickerContainer) return;

    const formattedStr = currentNum.toLocaleString('en-US');

    let generatedHTML = '';

    for (let char of formattedStr) {

        if (char === ',') {

            generatedHTML += `
                <span class="ticker-comma">,</span>
            `;

        } else {

            generatedHTML += `
                <span class="ticker-digit">
                    <span>${char}</span>
                </span>
            `;
        }
    }

    tickerContainer.innerHTML = generatedHTML;
}

async function loadCounter() {

    try {

        const counterRef = doc(db, "stats", "pageViews");

        // Increase by 1 every visit
        await updateDoc(counterRef, {
            count: increment(1)
        });

        // Read latest value
        const snapshot = await getDoc(counterRef);

        if (snapshot.exists()) {

            const liveCount = snapshot.data().count || 70142;

            updateTickerDisplay(liveCount);

            console.log(
                "Firestore counter loaded:",
                liveCount
            );
        }

    } catch (error) {

        console.error(
            "Firestore counter error:",
            error
        );
    }
}

loadCounter();

</script>
