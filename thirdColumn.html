<style>
    /* Third Column Dashboard Section Grid */
    .metric-showcase-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 40px;
        margin-bottom: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        gap: 40px;
    }

    /* Left Copy Area */
    .metric-info-side {
        max-width: 60%;
    }

    .metric-info-side h3 {
        font-size: 1.8rem;
        font-weight: 800;
        color: #ffffff;
        margin: 0 0 16px 0;
        letter-spacing: -0.5px;
    }

    .metric-info-side p {
        font-size: 1.1rem;
        color: #94a3b8; /* Soft readable slate text */
        line-height: 1.7;
        margin: 0;
    }

    .metric-info-side .highlight-compliance {
        color: #4ade80; /* Signature brand leaf-green */
        font-weight: 600;
    }

    /* Right Side Metered Counter Box */
    .counter-meter-box {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        min-width: 280px;
    }

    .counter-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
    }

    /* Live Digital Ticker Layout */
    .digital-ticker {
        background: #020617;
        border: 1px solid rgba(74, 222, 128, 0.2);
        border-radius: 16px;
        padding: 16px 24px;
        display: flex;
        gap: 6px;
        box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(74, 222, 128, 0.05);
    }

    /* Individual Ticker Number Nodes */
    .ticker-digit {
        font-family: monospace;
        font-size: 3.5rem;
        font-weight: 800;
        color: #ffffff;
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        padding: 4px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        min-width: 38px;
        text-align: center;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .ticker-comma {
        font-family: monospace;
        font-size: 2.5rem;
        font-weight: 800;
        color: rgba(74, 222, 128, 0.5);
        align-self: flex-end;
        padding-bottom: 4px;
    }

    /* Responsive Breakdown Configuration */
    @media (max-width: 992px) {
        .metric-showcase-container {
            flex-direction: column;
            align-items: flex-start;
            padding: 30px;
            gap: 30px;
        }
        .metric-info-side { max-width: 100%; }
        .counter-meter-box { align-items: flex-start; min-width: 100%; }
    }
</style>

<div class="metric-showcase-container">
    
    <div class="metric-info-side">
        <h3>Our Trusted Ecosystem are Moving Forward!</h3>
        <p> Join our robust Mypet-world community! We explicitly customized our care to serve pet better! 
          Our footprint reaches 50,000+ active users within Southeast Asia across  
          <span class="highlight-compliance">Malaysia, Thailand, Vietnam and Indonesia!</span>
        </p>
    </div>

    <div class="counter-meter-box">
        <div class="counter-label">Global Active Footprint</div>
        <div class="digital-ticker" id="liveEcosystemTicker">
            <span class="ticker-digit">-</span>
            <span class="ticker-digit">-</span>
            <span class="ticker-comma">,</span>
            <span class="ticker-digit">-</span>
            <span class="ticker-digit">-</span>
            <span class="ticker-digit">-</span>
        </div>
    </div>

</div>

<script>
    function initLiveVisitorCounter() {
        const tickerContainer = document.getElementById('liveEcosystemTicker');
        
        // Safety Step 1: Wait for HTML template layout to finish loading
        if (!tickerContainer) {
            setTimeout(initLiveVisitorCounter, 50);
            return;
        }

        function updateTickerDisplay(currentNum) {
            const formattedStr = currentNum.toLocaleString('en-US');
            let generatedHTML = '';

            for (let char of formattedStr) {
                if (char === ',') {
                    generatedHTML += `<span class="ticker-comma">,</span>`;
                } else {
                    generatedHTML += `<span class="ticker-digit">${char}</span>`;
                }
            }
            tickerContainer.innerHTML = generatedHTML;
        }

        // Safety Step 2: Wait for global Firebase object to finish initialization
        if (typeof firebase === 'undefined' || !firebase.apps || firebase.apps.length === 0) {
            setTimeout(initLiveVisitorCounter, 100);
            return;
        }

        try {
            const db = firebase.firestore();
            // Target a specific, single metric document in your database
            const counterDocRef = db.collection('metrics').doc('visitor_counter');

            // 🚀 STEP A: Increment the global website view counter by +1 instantly on page load
            // uses fieldvalue.increment so multiple users loading simultaneously won't clash
            counterDocRef.set({
                total_views: firebase.firestore.FieldValue.increment(1)
            }, { merge: true }).catch(err => console.warn("Visitor hit increment paused:", err));

            // 📡 STEP B: Listen to that exact single number and feed it directly into your ticker layout
            counterDocRef.onSnapshot((doc) => {
                let realCloudHits = 0;
                
                if (doc.exists && doc.data().total_views) {
                    realCloudHits = doc.data().total_views;
                }
                
                // Balance math: Add your massive 50,000 legacy footprint offset to the real hits
                const absoluteTotalFootprint = 70412 + realCloudHits;
                
                updateTickerDisplay(absoluteTotalFootprint);
                console.log(`Global visitor web hits updated. Cloud Hits: ${realCloudHits} Ticker: ${absoluteTotalFootprint}`);
            }, (error) => {
                console.error("Firestore stream dropped:", error);
                updateTickerDisplay(70412); // Safe structural fallback
            });

        } catch (err) {
            console.error("Metrics loop error:", err);
            updateTickerDisplay(70412);
        }
    }

    // Launch connection pipeline safely
    initLiveVisitorCounter();
</script>
