<style>
    /* Slider Container */
    .hero-slider {
        position: relative;
        width: 100%;
        height: 450px; /* Perfect height for a dashboard banner */
        border-radius: 24px;
        overflow: hidden;
        margin-bottom: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* The Moving Slides Wrapper */
    .slider-track {
        position: absolute;
        width: 100%;
        height: 100%;
    }

    /* Individual Slide Configuration */
    .slide {
        position: absolute;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        /* Balanced across a 16-second loop for 4 distinct images */
        animation: fadeAnimation 16s infinite ease-in-out;
    }

    /* 📸 YOUR IMAGE ASSETS MAPPED HERE */
    .slide:nth-child(1) {
        background-image: url('assets/slider1.png'); 
        animation-delay: 0s;
    }
    .slide:nth-child(2) {
        background-image: url('assets/slider2.png'); 
        animation-delay: 4s;
    }
    .slide:nth-child(3) {
        background-image: url('assets/slider3.png'); 
        animation-delay: 8s;
    }
    .slide:nth-child(4) {
        background-image: url('assets/slider4.png'); 
        animation-delay: 12s;
    }

    /* Dark Elegant Overlay so text is ALWAYS readable on glass */
    .slider-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(2, 6, 23, 0.4); /* Soft tint */
        backdrop-filter: blur(2px);       /* Tiny extra layer of smoothness */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 24px;
        z-index: 4;
    }

    .slider-overlay h1 {
        font-size: 2.8rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 12px;
        text-shadow: 0 4px 12px rgba(0,0,0,0.6);
        font-family: 'Lexend', sans-serif;
    }

    .slider-overlay p {
        font-size: 1.2rem;
        color: #4ade80; /* Matching your leaf-green brand */
        font-weight: 400;
        max-width: 600px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        font-family: 'Lexend', sans-serif;
    }

    /* THE MAGIC 4-SLIDE CROSS-FADE FORMULA */
    @keyframes fadeAnimation {
        0% { opacity: 0; }
        6% { opacity: 1; }   /* Fade in quickly */
        25% { opacity: 1; }  /* Hold image on screen */
        31% { opacity: 0; }  /* Fade out smoothly */
        100% { opacity: 0; } /* Hold hidden until loop restarts */
    }

    /* Mobile scaling safety */
    @media (max-width: 768px) {
        .hero-slider { height: 300px; }
        .slider-overlay h1 { font-size: 1.8rem; }
        .slider-overlay p { font-size: 0.95rem; }
    }
</style>

<div class="hero-slider">
    <div class="slider-track">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    
    <div class="slider-overlay">
        <h1>Welcome to Mypet-world</h1>
        <p>The ultimate modern workspace and ecosystem for contemporary pet caretakers.</p>
    </div>
</div>
