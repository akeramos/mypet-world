<header class="pet-header">
    <div class="animated-bg">
        <span class="floating-animal">🐶</span>
        <span class="floating-animal">🐱</span>
        <span class="floating-animal">🐹</span>
        <span class="floating-animal">🐦</span>
        <span class="floating-animal">🐾</span>
    </div>

    <div class="header-content">
        <a href="index.html" class="brand-container">
            <img src="https://lh3.googleusercontent.com/d/1-Yh5oQL9nOedGu-YyDFi0-KfqP18FiN-" alt="Mypet-world Logo" class="brand-logo">
            <h1 class="brand-name">Mypet-world</h1>
        </a>

        <nav>
            <a href="account.html" class="nav-link account-btn">👤 Account</a>
        </nav>
    </div>
</header>

<style>
/* --- Header Layout & Animated Background --- */
.pet-header {
    position: relative;
    padding: 15px 40px; 
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* --- The Layout Core: Splitting Left and Right --- */
.header-content {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between; 
    align-items: center; 
    max-width: 1400px;
    margin: 0 auto;
}

/* Brand styling container */
.brand-container {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: white;
}

.brand-logo {
    width: 45px;
    height: 45px;
    object-fit: cover;
    border-radius: 50%; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.brand-name {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 700;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    letter-spacing: -0.5px;
}

nav {
    display: flex;
    align-items: center;
    gap: 15px;
}

/* --- Moving Animals Magic --- */
.animated-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
}

.floating-animal {
    position: absolute;
    font-size: 1.8rem;
    bottom: -50px;
    opacity: 0.15;
    animation: floatUp 12s linear infinite;
}

.floating-animal:nth-child(1) { left: 10%; animation-duration: 10s; animation-delay: 0s; }
.floating-animal:nth-child(2) { left: 30%; animation-duration: 14s; animation-delay: 2s; }
.floating-animal:nth-child(3) { left: 55%; animation-duration: 11s; animation-delay: 1s; }
.floating-animal:nth-child(4) { left: 75%; animation-duration: 15s; animation-delay: 4s; }
.floating-animal:nth-child(5) { left: 90%; animation-duration: 9s;  animation-delay: 3s; }

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.25; }
    90% { opacity: 0.25; }
    100% { transform: translateY(-250px) rotate(360deg); opacity: 0; }
}

/* --- Navigation & Button Typography --- */
.nav-link {
    color: white;
    text-decoration: none;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.1);
    border: none;
    font-size: 0.95rem;
    cursor: pointer;
}

.nav-link:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
}

.account-btn {
    background: rgba(0, 0, 0, 0.2);
}
</style>
