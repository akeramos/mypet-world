<style>
  :root {
    --primary-blue: #009FFC;
  }

  /* Target the placeholder container directly */
  #first-column-placeholder {
    position: relative;
    background: #000000; 
    overflow: hidden;
    perspective: 1500px;
    font-family: 'Lexend', sans-serif;
    border-radius: 24px; /* Optional rounded edges looks better as a standalone section */
    margin-top: 30px; /* Spacing below your paragraph text */
    padding: 40px; /* Gives internal canvas contents breathing room */
  }

  @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap');

  #networkCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* Upgraded Card: Changed to horizontal row format for widescreen display rows */
  .clinic-card {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: row; /* Flipped back to side-by-side alignment inside the element */
    align-items: center;
    justify-content: center;
    padding: 30px 50px;
    background: rgba(15, 23, 42, 0.7); 
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    max-width: 600px;
    margin: 0 auto;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d;
    will-change: transform;
    cursor: pointer;
  }

  .content-wrapper {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center;
    transform-style: preserve-3d;
    pointer-events: none;
  }

  .clinic-logo {
    max-width: 90px;
    margin-right: 35px; /* Added margin space to the right side of picture frame */
    margin-bottom: 0;
    transform: translateZ(80px);
    filter: drop-shadow(0 0 20px rgba(0, 159, 252, 0.4));
  }

  .clinic-text {
    border-top: none;
    border-left: 4px solid var(--primary-blue); /* Clean accent divider line to the left of header */
    padding-left: 25px;
    padding-top: 0;
    transform: translateZ(50px);
    text-align: left;
  }

  .clinic-text h1 {
    margin: 0;
    font-size: 2.2rem; /* Enhanced text size for wide headers */
    font-weight: 800;
    color: #ffffff;
    line-height: 1.1;
    text-shadow: 0 0 15px rgba(0, 159, 252, 0.5);
  }

  /* Mobile Responsive fallbacks */
  @media (max-width: 600px) {
    .clinic-card, .content-wrapper { flex-direction: column; text-align: center; }
    .clinic-logo { margin: 0 0 20px 0; }
    .clinic-text { border-left: none; border-top: 3px solid var(--primary-blue); padding: 15px 0 0 0; }
    .clinic-text h1 { font-size: 1.8rem; }
  }
</style>
