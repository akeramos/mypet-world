<script>
  // Expose an initialization command globally so index.html can trigger it safely
  function initFirstColumnNetwork() {
    const canvas = document.getElementById('networkCanvas');
    if (!canvas) return; // Safeguard escape hatch
    
    const ctx = canvas.getContext('2d');
    const card = document.getElementById('card');
    const container = document.getElementById('first-column-placeholder');
    
    let particles = [];
    const particleCount = 30; 
    const connectionDist = 100;
    let mouse = { x: null, y: null };

    // Track mouse coordinates over the column area
    window.addEventListener('mousemove', (e) => {
      const containerRect = container.getBoundingClientRect();
      mouse.x = e.clientX - containerRect.left;
      mouse.y = e.clientY - containerRect.top;

      const rect = card.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top && e.clientY <= rect.bottom) {
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const rotateX = (y - rect.height/2) / 8;
        const rotateY = (rect.width/2 - x) / 8;
        card.style.transition = 'none';
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }
    });

    card.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
      card.style.transform = `rotateX(0deg) rotateY(0deg)`;
    });

    function resize() {
      if(container) {
        canvas.width = container.clientWidth || 250;
        canvas.height = container.clientHeight || 500;
        init();
      }
    }

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.baseSize = Math.random() * 2 + 2;
        this.size = this.baseSize;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.pulse = Math.random();
        this.pulseSpeed = Math.random() * 0.05 + 0.02;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.pulse += this.pulseSpeed;
        this.size = this.baseSize + Math.sin(this.pulse) * 1;

        if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
        if (this.y > canvas.height || this.y < 0) this.speedY *= -1;

        if (mouse.x >= 0 && mouse.x <= canvas.width && mouse.y >= 0 && mouse.y <= canvas.height) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 80) {
            this.x -= dx/40;
            this.y -= dy/40;
          }
        }
      }

      draw() {
        ctx.fillStyle = 'rgba(0, 159, 252, 0.8)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        for (let j = i; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectionDist) {
            ctx.strokeStyle = `rgba(0, 159, 252, ${0.6 - dist/connectionDist})`;
            ctx.lineWidth = 1; 
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }

    const resizeObserver = new ResizeObserver(() => resize());
    resizeObserver.observe(container);
    
    resize();
    animate();
  }
</script>
