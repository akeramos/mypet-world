<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mypet-world | Account Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // CLIENT CONFIGURATION LINKED TO: mypet-worlds
        const firebaseConfig = {
            apiKey: "AIzaSyAwbT7Tb1uh7XySfPjqvpit-A-OpuZ9wrw",
            authDomain: "mypet-worlds.firebaseapp.com",
            projectId: "mypet-worlds",
            storageBucket: "mypet-worlds.firebasestorage.app",
            messagingSenderId: "223873016606",
            appId: "1:223873016606:web:b228b11e349e9ee85c9f0f",
            measurementId: "G-XR07S3PJ2R"
        };
        
        // Initialize Firebase safely via browser compat channel
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // Include wrapper templates
        async function includeHTML(placeholderId, filename) {
            try {
                const response = await fetch(filename);
                if (response.ok) {
                    document.getElementById(placeholderId).innerHTML = await response.text();
                }
            } catch (error) { console.error(`Failed to fetch ${filename}`); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            includeHTML('header-placeholder', 'header.html');
            includeHTML('footer-placeholder', 'footer.html');
            initBackgroundOrganicPulse();
            setupAuthListener();
        });

        // Toggle Views gracefully inside the single glass panel
        function showForm(formType) {
            document.getElementById('signin-view').style.display = formType === 'signin' ? 'block' : 'none';
            document.getElementById('signup-view').style.display = formType === 'signup' ? 'block' : 'none';
            document.getElementById('forgot-view').style.display = formType === 'forgot' ? 'block' : 'none';
            document.getElementById('error-message').innerText = "";
        }

        // Handle State Transitions dynamically based on Firebase Auth Core
        function setupAuthListener() {
            auth.onAuthStateChanged(async (user) => {
                const gateway =
                    document.getElementById('auth-gateway');
                const profile =
                    document.getElementById('user-profile-view');
                if (user) {
                    gateway.style.display = 'none';
                    profile.style.display = 'block';

                  document.getElementById('profile-email')
                        .innerText = user.email;
                    try {
                        const userDoc =
                            await db
                                .collection("users")
                                .doc(user.uid)
                                .get();
                        if (!userDoc.exists) {
                          console.warn(
                                  "Profile not found."
                              );
                              setTimeout(() => {
                                  auth.signOut();
                              }, 1000);

                          return;
                        }
                        const profileType =
                            userDoc.data().profileType;
                        setTimeout(() => {
                            switch (profileType) {
                                case "pet_owner":
                                    window.location.href =
                                        "pet-owner-dashboard.html";
                                    break;
                                case "veterinary_clinic":
                                    window.location.href =
                                        "vet-dashboard.html";
                                    break;
                                case "event_organizer":
                                    window.location.href =
                                        "event-dashboard.html";
                                    break;
                                case "service_provider":
                                    window.location.href =
                                        "service-dashboard.html";
                                    break;
                                default:
                                    window.location.href =
                                        "index.html";
                            }
                        }, 1500);
                    } catch (error) {
                        console.error(
                            "Profile lookup failed:",
                            error
                        );
                        window.location.href =
                            "index.html";
                    }
                } else {
                    gateway.style.display = 'block';
                    profile.style.display = 'none';
                    showForm('signin');
                }
            });
        }

        // Firebase Operations Actions
        async function handleSignIn(e) {
            e.preventDefault();
            const email =
                document.getElementById('login-email').value;
            const pass =
                document.getElementById('login-pass').value;
            try {
                await auth.signInWithEmailAndPassword(
                    email,
                    pass
                );
                const user = auth.currentUser;
                if (!user.emailVerified) {                
                  await auth.signOut();
                  document.getElementById('error-message')
                    .innerText =                    
                    "Please verify your email before signing in.";
                  await auth.signOut();
                  return;
                }
            } catch (err) {
                document.getElementById('error-message')
                    .innerText = err.message;
            }
        }

        async function handleSignUp(e) {
            e.preventDefault();
            const profileType =
                document.getElementById('profile-type').value;
            const username =
                document.getElementById('username').value;
            const email =
                document.getElementById('register-email').value;
            const gender =
                document.getElementById('gender').value;
            const password =
                document.getElementById('register-pass').value;
            const confirmPassword =
                document.getElementById('confirm-pass').value;
            if (password !== confirmPassword) {
                document.getElementById('error-message')
                    .innerText = "Passwords do not match.";
                return;
            }
            try {
                const credential =
                    await auth.createUserWithEmailAndPassword(
                        email,
                        password
                    );
              await credential.user.sendEmailVerification();
              await db
                    .collection("users")
                    .doc(credential.user.uid)
                    .set({
                        email: email,
                        username: username,
                        profileType: profileType,
                        gender: gender,
                        createdAt:
                            firebase.firestore.FieldValue.serverTimestamp()
                    });
              alert(
                "Account created successfully. Please verify your email before signing in."
              );
              await auth.signOut();
              showForm('signin');

            } catch (err) {
                document.getElementById('error-message')
                    .innerText = err.message;
            }
        }

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            const errorBanner = document.getElementById('error-message');
            
            // Clear out any old error banners first
            errorBanner.innerText = "";
        
            try { 
                await auth.sendPasswordResetEmail(email); 
                
                // OPTION A: Secure, smart enterprise messaging
                alert('If this email address is registered in our database, a secure password reset link has been dispatched to your inbox. Please check your spam folder if it doesn\'t arrive shortly!');
                
                showForm('signin');
            } catch (err) { 
                // We catch immediate structural format errors (e.g. "testgmail.com")
                if (err.code === 'auth/invalid-email') {
                    errorBanner.innerText = "Please enter a valid email address format (e.g., name@domain.com).";
                } else {
                    // General network fallback errors
                    errorBanner.innerText = "An error occurred. Please try again later."; 
                }
            }
        }

        function handleSignOut() { auth.signOut(); }
    </script>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>
    <div id="header-placeholder"></div>
    
    <div class="content-container">
        <main class="auth-main">
            
            <div id="error-message" class="auth-error-banner"></div>

            <div id="auth-gateway" class="glass-card auth-card">
                
                <div id="signin-view">
                    <h3>Sign In</h3>
                    <form onsubmit="handleSignIn(event)">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="login-email" required placeholder="email@domain.com">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="login-pass" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="auth-btn btn-primary">Sign In</button>
                    </form>
                    <div class="auth-switchlinks">
                        <p>Need a Profile? <a href="#" onclick="showForm('signup')">Create Account Here</a></p>
                        <p><a href="#" onclick="showForm('forgot')">Forgot Password?</a></p>
                    </div>
                </div>

                <div id="signup-view" style="display:none;">
                    <h3>Create Profile</h3>

                    <form onsubmit="handleSignUp(event)">

                        <div class="input-group">
                            <label>Choose a Profile</label>
                            <select id="profile-type" required>
                                <option value="">Select Profile Type</option>
                                <option value="pet_owner">Pet Owner</option>
                                <option value="veterinary_clinic">Veterinary Clinic</option>
                                <option value="event_organizer">Event Organizer</option>
                                <option value="service_provider">Services Provider</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Username / Company Name</label>
                            <input type="text" id="username" minlength="3" maxlength="30" required>
                        </div>

                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="register-email" required>
                        </div>

                        <div class="input-group">
                            <label>Gender</label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="prefer_not_to_say">Prefer Not To Say</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="register-pass" minlength="6" required>
                        </div>

                        <div class="input-group">
                            <label>Confirm Password</label>
                            <input type="password" id="confirm-pass" minlength="6" required>
                        </div>

                        <button type="submit" class="auth-btn btn-primary">
                            Register New Account
                        </button>

                      <div class="auth-switchlinks">
                          <p>
                              Already have an account?
                              <a href="#" onclick="showForm('signin')">
                                  Sign In
                              </a>
                          </p>
                      </div>
                      
                    </form>
                </div>

                <div id="forgot-view" style="display:none;">
                    <h3>Recover Password</h3>
                    <form onsubmit="handleForgotPassword(event)">
                        <div class="input-group">
                            <label>Registered Email</label>
                            <input type="email" id="forgot-email" required placeholder="name@domain.com">
                        </div>
                        <button type="submit" class="auth-btn btn-primary">Send Reset Link</button>
                    </form>
                    <div class="auth-switchlinks">
                        <p>Remembered your settings? <a href="#" onclick="showForm('signin')">Back to Login</a></p>
                    </div>
                </div>

            </div>

            <div id="user-profile-view" class="glass-card auth-card" style="display: none;">
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <h3>Account Dashboard</h3>
                    <p class="profile-status-badge">Authenticated</p>
                </div>
                <div class="profile-details">
                    <p><strong>Account Identified:</strong> <span id="profile-email"></span></p>
                    <p><strong>Database Workspace Access:</strong> Authorization Verified)</p>
                </div>
                <button onclick="handleSignOut()" class="auth-btn btn-danger">Sign Out Successful</button>
            </div>

        </main>        
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Background logic matches index exactly to ensure zero console trace faulting
        let mouse = { x: null, y: null, radius: 250 };
        function initBackgroundOrganicPulse() {
            const canvas = document.getElementById('neuralCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight; init();
            }
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 12 + 8; this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
                    this.rotation = Math.random() * Math.PI * 2; this.rotationSpeed = (Math.random() - 0.5) * 0.005; this.opacity = Math.random() * 0.4 + 0.2;
                }
                draw() {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                    ctx.strokeStyle = `rgba(74, 222, 128, ${this.opacity})`; ctx.fillStyle = `rgba(74, 222, 128, ${this.opacity * 0.3})`; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.quadraticCurveTo(this.size, 0, 0, this.size); ctx.quadraticCurveTo(-this.size, 0, 0, -this.size);
                    ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, -this.size); ctx.lineTo(0, this.size); ctx.stroke(); ctx.restore();
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
            }
            function init() { particles = []; for (let i = 0; i < 40; i++) particles.push(new Particle()); }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize); resize(); animate();
        }
    </script>
</body>
</html>
