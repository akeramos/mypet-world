<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mypet-world | Manage Pet Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>

    <div class="content-container" style="padding: 40px 20px; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box;">
        <main class="auth-main" style="max-width: 650px; width:100%; min-height: auto;">
            
            <div style="width: 100%; text-align: left; margin-bottom: 20px;">
                <a href="../pet-owner-dashboard.html" style="color: var(--leaf-green); text-decoration: none; font-weight: 700; font-family: 'Lexend', sans-serif;">⬅️ Back to Dashboard</a>
            </div>

            <div class="glass-card auth-card" style="max-width: 100%; width: 100%; text-align: left;">
                <h2 style="margin-top: 0; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: #fff;">🐾 Pet Profile Registry</h2>
                <p style="color: #cbd5e1; margin-bottom: 24px;">Register or update your pet's record details inside the secure ecosystem network matrix.</p>

                <form id="petForm">
                    <div class="input-group">
                        <label>Pet's Name</label>
                        <input type="text" id="petName" placeholder="e.g. Fluffy" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>Species</label>
                            <select id="petSpecies" required>
                                <option value="" disabled selected>Select Species</option>
                                <option value="dog">Canine (Dog)</option>
                                <option value="cat">Feline (Cat)</option>
                                <option value="rabbit">Lagomorph (Rabbit)</option>
                                <option value="bird">Avian (Bird)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Subspecies / Breed</label>
                            <input type="text" id="petSubspecies" placeholder="e.g. Golden Retriever" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>Age (Years)</label>
                            <input type="number" id="petAge" min="0" max="40" placeholder="Optional">
                        </div>
                        <div class="input-group">
                            <label>Gender</label>
                            <select id="petGender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Generated Unique System ID</label>
                        <input type="text" id="petUniqueId" readonly style="background: rgba(0,0,0,0.3); color: var(--leaf-green); font-weight: 800; letter-spacing: 1px;">
                    </div>

                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0;">

                    <h3 style="color: var(--leaf-green); font-size: 1.2rem; margin-top: 0;">💉 Vaccination Information</h3>
                    
                    <div id="vaccineInfoBanner" style="background: rgba(74, 222, 128, 0.1); border: 1px dashed var(--leaf-green); padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 16px; display: none;">
                        <span style="font-weight: 700; color: #fff;">💡 Recommended Schedule:</span> <span id="vaccineRecommendationText">Select a species to view metrics.</span>
                    </div>

                    <div class="input-group">
                        <label>Type of Vaccination Given</label>
                        <input type="text" id="vaccineType" placeholder="e.g. DHPP / FVRCP Core Vaccine">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="input-group">
                            <label>Date of Administration</label>
                            <input type="date" id="vaccineDate">
                        </div>
                        <div class="input-group">
                            <label>Calculated Expiry Date (Auto-Generated)</label>
                            <input type="date" id="vaccineExpiry" readonly style="background: rgba(0,0,0,0.3); color: #fff;">
                        </div>
                    </div>

                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0;">

                    <h3 style="color: var(--leaf-green); font-size: 1.2rem; margin-top: 0;">🏥 Medical Health Logs</h3>
                    <div class="input-group">
                        <label>1. General Health Notes</label>
                        <input type="text" id="healthLog1" placeholder="e.g. No known chronic food allergies or history of joint issues.">
                    </div>
                    <div class="input-group">
                        <label>2. Current Medications / Treatments</label>
                        <input type="text" id="healthLog2" placeholder="e.g. Regular monthly tick and heartworm preventative treatment.">
                    </div>

                    <button type="submit" class="auth-btn btn-primary" style="margin-top: 20px;">💾 Secure Profile Record</button>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px;">
                        <a href="#" class="auth-btn btn-danger" style="text-align: center; text-decoration: none; font-size: 0.85rem; background: rgba(239, 68, 68, 0.1); padding: 10px;">🚨 Missing Animal</a>
                        <a href="#" class="auth-btn btn-danger" style="text-align: center; text-decoration: none; font-size: 0.85rem; background: rgba(148, 163, 184, 0.1); border-color: rgba(148, 163, 184, 0.4); color: #cbd5e1; padding: 10px;">🌹 Memorial File</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwbT7Tb1uh7XySfPjqvpit-A-OpuZ9wrw",
            authDomain: "mypet-worlds.firebaseapp.com",
            projectId: "mypet-worlds",
            storageBucket: "mypet-worlds.firebasestorage.app",
            messagingSenderId: "223873016606",
            appId: "1:223873016606:web:b228b11e349e9ee85c9f0f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUserId = null;

        // Security Authentication Router Sync Handshake Block
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "../account.html";
            } else {
                currentUserId = user.uid;
                // Generate clean Unique random 4-5 digit system code on initial entry load condition
                document.getElementById('petUniqueId').value = Math.floor(1000 + Math.random() * 90000);
            }
        });

        // Dynamic Infographic Schedules Selection Maps Array Configuration
        const scheduleSpecs = {
            dog: "Core Rabies, DHPP (Distemper, Hepatitis, Parvovirus, Parainfluenza). Booster needed every 3 Years.",
            cat: "Core FVRCP (Feline Viral Rhinotracheitis, Calicivirus, Panleukopenia) + Rabies. Booster needed every 3 Years.",
            rabbit: "Myxomatosis and Rabbit Haemorrhagic Disease (RHDV-1 & RHDV-2). Booster needed annually.",
            bird: "Polyomavirus & Psittacosis screen tracks. Consult specialized avian practitioners."
        };

        document.getElementById('petSpecies').addEventListener('change', (e) => {
            const chosen = e.target.value;
            const banner = document.getElementById('vaccineInfoBanner');
            const targetText = document.getElementById('vaccineRecommendationText');
            
            if(scheduleSpecs[chosen]) {
                targetText.innerText = scheduleSpecs[chosen];
                banner.style.display = "block";
            }
        });

        // Auto Expiry Date Calculator Logic Tracker Engine
        document.getElementById('vaccineDate').addEventListener('change', (e) => {
            const adminDateStr = e.target.value;
            if(!adminDateStr) return;

            const adminDate = new Date(adminDateStr);
            const selectedSpecies = document.getElementById('petSpecies').value;
            
            // Set lifespan parameters: Rabbits need yearly boosters, cats/dogs get 3 years
            const gapYears = (selectedSpecies === 'rabbit') ? 1 : 3;
            adminDate.setFullYear(adminDate.getFullYear() + gapYears);

            // Output clean raw string back into view node structure template
            document.getElementById('vaccineExpiry').value = adminDate.toISOString().split('T')[0];
        });

        // Firestore Registry Writing System
        document.getElementById('petForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUserId) return;

            const petRecord = {
                petName: document.getElementById('petName').value,
                species: document.getElementById('petSpecies').value,
                subspecies: document.getElementById('petSubspecies').value,
                age: document.getElementById('petAge').value || "N/A",
                gender: document.getElementById('petGender').value,
                uniqueID: document.getElementById('petUniqueId').value,
                vaccination: {
                    type: document.getElementById('vaccineType').value || "None Listed",
                    administeredDate: document.getElementById('vaccineDate').value || "",
                    expiryDate: document.getElementById('vaccineExpiry').value || ""
                },
                healthLogs: [
                    document.getElementById('healthLog1').value || "",
                    document.getElementById('healthLog2').value || ""
                ],
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // 🚀 NESTING SECURE POINT: Save deep nested data directly inside user path map subcollection array
                await db.collection("users").doc(currentUserId).collection("pets").add(petRecord);
                alert(`Success! ${petRecord.petName}'s profile secure file record compiled successfully.`);
                window.location.href = "../pet-owner-dashboard.html";
            } catch(error) {
                console.error("Firestore nested writing processing pipeline drop:", error);
                alert("Database server network drop occurred. Profile registry failed.");
            }
        });
    </script>
</body>
</html>
