<div class="glass-card pet-profile-form-instance" style="margin-bottom: 32px; text-align: left; background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25); position: relative;">
    
    <button class="remove-form-btn" onclick="this.closest('.pet-profile-form-instance').remove();" style="position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #f87171; font-size: 1.2rem; cursor: pointer; font-weight: 800;">❌</button>

    <h2 style="margin-top: 0; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; color: #fff;">Animal Companion Registry 🐾</h2>
    <p style="color: #cbd5e1; margin-bottom: 24px; font-size: 0.95rem;">Register a new animal companion file under your secure master account.</p>

    <form class="dynamic-pet-submit-form">
        <div class="input-group">
            <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Companion's Name</label>
            <input type="text" class="petName" placeholder="e.g. Fluffy, James" required style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Species</label>
                <select class="petSpecies" required onchange="handleSpeciesChange(this)" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; cursor: pointer; outline: none;">
                    <option value="" disabled selected>Select Species</option>
                    <option value="dog">Canine (Dog)</option>
                    <option value="cat">Feline (Cat)</option>
                    <option value="rabbit">Lagomorph (Rabbit)</option>
                    <option value="bird">Avian (Bird)</option>
                </select>
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Subspecies / Breed</label>
                <input type="text" class="petSubspecies" placeholder="e.g. Golden Retriever" required style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Age (Years)</label>
                <input type="number" class="petAge" min="0" max="40" placeholder="If available" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Gender</label>
                <select class="petGender" required style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; cursor: pointer; outline: none;">
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <div class="input-group" style="margin-top: 16px;">
            <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Unique System ID</label>
            <input type="text" class="petUniqueId" readonly style="background: rgba(0,0,0,0.3); color: var(--leaf-green); font-weight: 800; letter-spacing: 1px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none;">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0;">

        <h2 style="color: var(--leaf-green); font-size: 1.2rem; margin-top: 0; font-weight: 800; color: #fff;">Vaccination Information</h2>
        
        <div class="vaccineInfoBanner" style="background: rgba(74, 222, 128, 0.1); border: 1px dashed var(--leaf-green); padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 16px; display: none;">
            <span style="font-weight: 700; color: #fff;">💡 Recommendation:</span> <span class="vaccineRecommendationText"></span>
        </div>

        <h2 style="color: var(--leaf-green); font-size: 1.2rem; margin-top: 0; font-weight: 800; color: #fff;">Vaccination Information</h2>
        
        <div class="vaccineInfoBanner" style="background: rgba(74, 222, 128, 0.1); border: 1px dashed var(--leaf-green); padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 16px; display: none;">
            <span style="font-weight: 700; color: #fff;">💡 Recommendation:</span> <span class="vaccineRecommendationText"></span>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Type of Vaccination</label>
                <input type="text" class="vaccineType" placeholder="e.g. Core Feline 4-Way" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Vaccine Brand Label / Components</label>
                <input type="text" class="vaccineLabel" placeholder="e.g. PureVax Feline 4 (fvrv-FCV-fpV)" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 16px;">
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Serial / Batch No.</label>
                <input type="text" class="vaccineSerial" placeholder="e.g. 64393A" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Veterinarian Name</label>
                <input type="text" class="vaccineVet" placeholder="e.g. Dr Ismasyahir" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">MVC Registration No.</label>
                <input type="text" class="vaccineMvc" placeholder="e.g. 1451" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Date of Administration</label>
                <input type="date" class="vaccineDate" onchange="handleDateChange(this)" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none; cursor: pointer;">
            </div>
            <div class="input-group">
                <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">Expected Expiration Date</label>
                <input type="date" class="vaccineExpiry" readonly style="background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none;">
            </div>
        </div>        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0;">

        <h2 style="color: var(--leaf-green); font-size: 1.2rem; margin-top: 0; font-weight: 800; color: #fff;">Health Information</h2>
        <div class="input-group">
            <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">1. Health Notes</label>
            <input type="text" class="healthLog1" placeholder="e.g. Allergy to peanut" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
        </div>
        <div class="input-group" style="margin-top: 16px;">
            <label style="font-size: 0.85rem; color: #cbd5e1; font-weight: 600; display: block; margin-bottom: 6px;">2. Allergy history</label>
            <input type="text" class="healthLog2" placeholder="e.g. Monthly heartworm preventative" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; outline: none;">
        </div>

        <button type="submit" class="auth-btn btn-primary" style="margin-top: 28px; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; font-family: 'Lexend', sans-serif;">Save Your Companion Record</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 14px;">
            <a href="#" class="auth-btn btn-danger" style="text-align: center; text-decoration: none; font-size: 0.85rem; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 10px; font-weight: 700; border: 1px solid rgba(239, 68, 68, 0.4); color: #f87171; font-family: 'Lexend', sans-serif;">Report Missing</a>
            <a href="#" class="auth-btn btn-danger" style="text-align: center; text-decoration: none; font-size: 0.85rem; background: rgba(148, 163, 184, 0.1); padding: 10px; border-radius: 10px; font-weight: 700; border: 1px solid rgba(148, 163, 184, 0.4); color: #cbd5e1; font-family: 'Lexend', sans-serif;">Report Dead</a>
        </div>
    </form>
</div>
