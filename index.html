<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mypet-world | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script>
        async function includeHTML(placeholderId, filename) {
            try {
                const response = await fetch(filename);
                if (response.ok) {
                    document.getElementById(placeholderId).innerHTML = await response.text();
                } else {
                    console.error(`Failed to load ${filename}: ${response.statusText}`);
                }
            } catch (error) {
                console.error(`Error fetching ${filename}:`, error);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            includeHTML('header-placeholder', 'header.html');
            includeHTML('services-grid-placeholder', 'services.html');
            includeHTML('services2-grid-placeholder', 'services.html');
            includeHTML('about-placeholder', 'firstColumn.html');                         
            includeHTML('first-column-placeholder', 'firstColumn.html');             
            includeHTML('second-column-placeholder', 'secondColumn.html');
            includeHTML('footer-placeholder', 'footer.html');
            // Kick off the background animation natively on index
            initBackgroundOrganicPulse();
        });
    </script>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>

    <div id="header-placeholder"></div>
    
    <div class="content-container">
        <main>
            <h2>Welcome to Mypet-world!</h2>
            <p>This space is your main dashboard workspace content area. Insert Column below.</p>

            <div id="services-grid-placeholder"></div>
            <div id="services2-grid-placeholder"></div>
            <div id="about-placeholder"></div>
            <div id="first-column-placeholder"></div>
            <div id="second-column-placeholder"></div>
        </main>        
    </div>

    <div id="footer-placeholder"></div>

    <script>
        let mouse = { x: null, y: null, radius: 250 };

        function initBackgroundOrganicPulse() {
            const canvas = document.getElementById('neuralCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                init();
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 12 + 8; 
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.005;
                    this.opacity = Math.random() * 0.4 + 0.2;
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.strokeStyle = `rgba(74, 222, 128, ${this.opacity})`;
                    ctx.fillStyle = `rgba(74, 222, 128, ${this.opacity * 0.3})`;
                    ctx.lineWidth = 1.5;

                    // Leaf Path
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.quadraticCurveTo(this.size, 0, 0, this.size);
                    ctx.quadraticCurveTo(-this.size, 0, 0, -this.size);
                    ctx.fill();
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(0, this.size);
                    ctx.stroke();
                    ctx.restore();
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < 60; i++) particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = p.x - mouse.x;
                        let dy = p.y - mouse.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < mouse.radius) {
                            ctx.strokeStyle = `rgba(74, 222, 128, ${0.3 * (1 - dist/mouse.radius)})`;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            resize();
            animate();
        }
    </script>
</body>
</html>
