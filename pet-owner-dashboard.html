<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mypet-world | Pet Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/first.png">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>  
    <script src="counter.js"></script>

    <script>
        async function includeHTML(placeholderId, filename) {
            try {
                const response = await fetch(filename);
                if (response.ok) {
                    document.getElementById(placeholderId).innerHTML = await response.text();
                } else {
                    console.error(`Failed to load ${filename}: ${response.statusText}`);
                }
            } catch (error) {
                console.error(`Error fetching ${filename}:`, error);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                includeHTML('header-placeholder', 'header.html'),
                includeHTML('services-grid-placeholder', 'services.html'),
                includeHTML('services2-grid-placeholder', 'services2.html'),
                includeHTML('third-column-placeholder', 'thirdColumn.html'),
                includeHTML('footer-placeholder', 'footer.html')
            ]);
            loadCounter();
            window.dispatchEvent(new Event('ComponentsLoaded'));
            initBackgroundOrganicPulse();
        });
    </script>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>

    <div id="header-placeholder"></div>
    
    <div class="content-container">
        <main>            
            <div class="glass-card" style="margin-bottom: 32px; text-align: left; background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);">
                <h2 style="margin-top:0; font-size: 1.8rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px;">Welcome <span id="dash-username" style="color: #4ade80; text-transform: capitalize;"></span>! 🐾</h2>
                <p style="font-size: 1.1rem; color: #cbd5e1; margin: 8px 0;"><strong>Account Type:</strong> <span id="dash-role" style="color: #4ade80; font-weight: 600;">Pet Owner</span></p>
                <p style="font-size: 1.1rem; color: #94a3b8; margin: 8px 0; line-height: 1.7;"><strong>Registered Email:</strong> <span id="dash-email">...</span></p>
                
                <div style="margin-top: 14px; margin-bottom: 10px;">
                    <button onclick="injectNewPetForm()" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; font-family: 'Lexend', sans-serif; transition: all 0.2s ease; border:none; cursor:pointer;">
                        Add Companion Animal
                    </button>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 20px;">
                    <h1 style="font-size: 1.5rem; font-weight: 700; color: #ffffff; margin: 0;">Dashboard</h1>
                    <button id="dash-logout-btn" class="btn-danger" style="display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; font-family: 'Lexend', sans-serif; cursor: pointer; transition: all 0.2s ease;">
                        SIGN OUT
                    </button>
                </div>
            </div>

            <div id="dynamic-pet-forms-container"></div>

            <div id="live-registered-pets-feed"></div>
            
            <div id="services-grid-placeholder"></div>
            <div id="services2-grid-placeholder"></div>
            <div id="third-column-placeholder"></div>
        </main>      
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwbT7Tb1uh7XySfPjqvpit-A-OpuZ9wrw",
            authDomain: "mypet-worlds.firebaseapp.com",
            projectId: "mypet-worlds",
            storageBucket: "mypet-worlds.firebasestorage.app",
            messagingSenderId: "223873016606",
            appId: "1:223873016606:web:b228b11e349e9ee85c9f0f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUserId = null;
        let activePetsListener = null;

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                if (activePetsListener) activePetsListener();
                window.location.href = "account.html";
                return;
            }
            currentUserId = user.uid;

            try {
                const userDoc = await db.collection("users").doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    if (document.getElementById('dash-username')) document.getElementById('dash-username').innerText = userData.username || "Pet Owner";
                    if (document.getElementById('dash-email')) document.getElementById('dash-email').innerText = userData.email || user.email;
                    if (document.getElementById('dash-role')) document.getElementById('dash-role').innerText = (userData.profileType || "PET_OWNER").replace('_', ' ').toUpperCase();
                }

                startLivePetsListener();

            } catch (error) { console.error("Error initializing dashboard metadata maps:", error); }
        });

        // 🔄 RENDERING PIPELINE: Streams clinical data profiles and generates medical history badges
        function startLivePetsListener() {
            if (!currentUserId) return;

            const feedContainer = document.getElementById('live-registered-pets-feed');

            activePetsListener = db.collection("users").doc(currentUserId).collection("pets")
                .orderBy("updatedAt", "desc")
                .onSnapshot(async (snapshot) => {
                    
                    feedContainer.innerHTML = "";

                    if (snapshot.empty) {
                        feedContainer.innerHTML = `
                            <div style="text-align: center; color: #94a3b8; padding: 40px 20px; border: 1px dashed rgba(255,255,255,0.06); border-radius:24px; background: rgba(15, 23, 42, 0.2); font-family: 'Lexend', sans-serif;">
                                🐾 No registered companion animal files located under this profile matrix yet. Click "Add Pet" above to establish a new record file.
                            </div>
                        `;
                        return;
                    }

                    const response = await fetch('petowner/registered-pet.html');
                    if (!response.ok) return;
                    const cardTemplateHTML = await response.text();

                    snapshot.forEach((doc) => {
                        const petData = doc.data();
                        const petId = doc.id;

                        const cardWrapper = document.createElement('div');
                        cardWrapper.innerHTML = cardTemplateHTML;
                        const cardElement = cardWrapper.firstElementChild;

                        cardElement.setAttribute('data-id', petId);

                        cardElement.querySelector('.view-petName').innerText = petData.petName || "Unnamed";
                        cardElement.querySelector('.view-petGender').innerText = petData.gender || "Unknown";
                        cardElement.querySelector('.view-petSpecies').innerText = petData.species || "Unknown";
                        cardElement.querySelector('.view-petSubspecies').innerText = petData.subspecies || "Unknown";
                        cardElement.querySelector('.view-petAge').innerText = petData.age || "N/A";
                        cardElement.querySelector('.view-petUniqueId').innerText = petData.uniqueID || "------";
                        cardElement.querySelector('.view-healthLog1').innerText = petData.healthLogs ? petData.healthLogs[0] : "";
                        cardElement.querySelector('.view-healthLog2').innerText = petData.healthLogs ? petData.healthLogs[1] : "";

                        // 💉 RENDERING NEW CLINICAL DETAILS: Generate detailed list nodes for history cards
                        const vaccineContainer = cardElement.querySelector('.view-vaccine-list');
                        vaccineContainer.innerHTML = ""; 

                        const historyArray = petData.vaccinations || [];

                        if (historyArray.length === 0) {
                            vaccineContainer.innerHTML = `<span style="color: #64748b; font-size: 0.9rem; font-style: italic;">No verified medical vaccine records tracked.</span>`;
                        } else {
                            historyArray.forEach((vac) => {
                                const row = document.createElement('div');
                                row.style.cssText = "background: rgba(2, 6, 23, 0.3); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 10px; font-family: 'Lexend', sans-serif;";
                                row.innerHTML = `
                                    <div style="display: flex; justify-content: space-between; align-items: center; wrap: wrap; gap: 8px;">
                                        <span style="font-weight: 800; color: #fff; font-size: 0.95rem;">🛡️ ${vac.type}</span>
                                        <span style="color: #94a3b8; font-size: 0.8rem;">Administered: <strong>${vac.date}</strong></span>
                                    </div>
                                    <div style="margin-top: 6px; font-size: 0.85rem; color: #cbd5e1; line-height: 1.5; background: rgba(0,0,0,0.15); padding: 8px 12px; border-radius: 6px;">
                                        <strong>Label/Components:</strong> ${vac.label || 'N/A'}<br>
                                        <strong>Serial/Batch:</strong> <span style="font-family: monospace; color: var(--leaf-green); font-weight:700;">${vac.serialNumber || 'N/A'}</span><br>
                                        <strong>Veterinarian:</strong> ${vac.vetName || 'N/A'} <span style="color: #64748b; font-size:0.75rem;">(MVC: ${vac.mvcNo || 'N/A'})</span>
                                    </div>
                                    <div style="margin-top: 6px; text-align: right; font-size: 0.8rem; color: #f87171; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">
                                        ⏳ Expires: ${vac.expiry}
                                    </div>
                                `;
                                vaccineContainer.appendChild(row);
                            });
                        }

                        feedContainer.appendChild(cardElement);
                    });
                }, (error) => {
                    console.error("Realtime companion tracking stream broken:", error);
                });
        }

        // 💾 FORM SAVING ACTION: Collects your new legal clinical properties on initial setup
        async function injectNewPetForm() {
            try {
                const response = await fetch('petowner/pet-profile.html');
                if (!response.ok) return;
                const formHTML = await response.text();

                const container = document.getElementById('dynamic-pet-forms-container');
                const tempWrapper = document.createElement('div');
                tempWrapper.innerHTML = formHTML;
                const freshFormElement = tempWrapper.firstElementChild;

                const customRefId = db.collection("users").doc(currentUserId).collection("pets").doc().id;
                const polishedShortId = customRefId.substring(0, 6).toUpperCase();
                freshFormElement.querySelector('.petUniqueId').value = polishedShortId;

                freshFormElement.querySelector('.dynamic-pet-submit-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    if(!currentUserId) return;

                    const vType = freshFormElement.querySelector('.vaccineType').value;
                    const vLabel = freshFormElement.querySelector('.vaccineLabel').value;
                    const vSerial = freshFormElement.querySelector('.vaccineSerial').value;
                    const vVet = freshFormElement.querySelector('.vaccineVet').value;
                    const vMvc = freshFormElement.querySelector('.vaccineMvc').value;
                    const vDate = freshFormElement.querySelector('.vaccineDate').value;
                    const vExpiry = freshFormElement.querySelector('.vaccineExpiry').value;

                    let initialVaccines = [];
                    if (vType && vDate) {
                        initialVaccines.push({
                            type: vType,
                            label: vLabel || "N/A",
                            serialNumber: vSerial || "N/A",
                            vetName: vVet || "N/A",
                            mvcNo: vMvc || "N/A",
                            date: vDate,
                            expiry: vExpiry
                        });
                    }

                    const petRecord = {
                        petName: freshFormElement.querySelector('.petName').value,
                        species: freshFormElement.querySelector('.petSpecies').value,
                        subspecies: freshFormElement.querySelector('.petSubspecies').value,
                        age: freshFormElement.querySelector('.petAge').value || "N/A",
                        gender: freshFormElement.querySelector('.petGender').value,
                        uniqueID: polishedShortId,
                        vaccinations: initialVaccines,
                        healthLogs: [
                            freshFormElement.querySelector('.healthLog1').value || "",
                            freshFormElement.querySelector('.healthLog2').value || ""
                        ],
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    try {
                        await db.collection("users").doc(currentUserId).collection("pets").add(petRecord);
                        freshFormElement.remove(); 
                    } catch(err) {
                        console.error("Profile submit transaction crash:", err);
                        alert("Database server transaction failed.");
                    }
                });

                container.insertBefore(freshFormElement, container.firstChild);
            } catch (error) { console.error(error); }
        }

        // ➕ RECORD INLINE BOOSTER LOGS: Updates helper mechanics to capture brand, batch numbers, and clinician parameters
        async function submitInlineBooster(btn) {
            const card = btn.closest('.registered-pet-card');
            const petId = card.getAttribute('data-id');
            if (!currentUserId || !petId) return;

            const typeInput = card.querySelector('.newVaccineType');
            const dateInput = card.querySelector('.newVaccineDate');
            
            // 🚀 GRAB EXTRA INLINE INPUTS: Pull values off our expanded inline view layout panel forms
            const labelInput = card.querySelector('.newVaccineLabel');
            const serialInput = card.querySelector('.newVaccineSerial');
            const vetInput = card.querySelector('.newVaccineVet');
            const mvcInput = card.querySelector('.newVaccineMvc');

            const type = typeInput.value.trim();
            const date = dateInput.value;

            if (!type || !date) {
                alert("Please fill in both the vaccine name and administration date.");
                return;
            }

            const speciesText = card.querySelector('.view-petSpecies').innerText.toLowerCase();
            const adminDate = new Date(date);
            const gapYears = speciesText.includes('rabbit') ? 1 : 3;
            adminDate.setFullYear(adminDate.getFullYear() + gapYears);
            const expiry = adminDate.toISOString().split('T')[0];

            const newVaccineObj = { 
                type, 
                label: labelInput ? labelInput.value.trim() || "N/A" : "N/A",
                serialNumber: serialInput ? serialInput.value.trim() || "N/A" : "N/A",
                vetName: vetInput ? vetInput.value.trim() || "N/A" : "N/A",
                mvcNo: mvcInput ? mvcInput.value.trim() || "N/A" : "N/A",
                date, 
                expiry 
            };

            try {
                const petRef = db.collection("users").doc(currentUserId).collection("pets").doc(petId);
                
                await petRef.update({
                    vaccinations: firebase.firestore.FieldValue.arrayUnion(newVaccineObj),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                typeInput.value = "";
                dateInput.value = "";
                if(labelInput) labelInput.value = "";
                if(serialInput) serialInput.value = "";
                if(vetInput) vetInput.value = "";
                if(mvcInput) mvcInput.value = "";
                
                card.querySelector('.booster-form-slot').style.display = 'none';
                alert("Vaccination passport log successfully updated!");
            } catch (error) {
                console.error("Error appending booster shot document log:", error);
                alert("Failed to record vaccination entry.");
            }
        }

        // Shared dynamic conversion tools
        const scheduleSpecs = {
            dog: "Core Rabies, DHPP (Distemper, Hepatitis, Parvovirus, Parainfluenza). Booster every 3 Years.",
            cat: "Core FVRCP (Feline Viral Rhinotracheitis, Calicivirus, Panleukopenia) + Rabies. Booster every 3 Years.",
            rabbit: "Myxomatosis and Rabbit Haemorrhagic Disease (RHDV-1 & RHDV-2). Booster annually.",
            bird: "Polyomavirus & Psittacosis screen tracks. Consult avian practitioner."
        };

        function handleSpeciesChange(selectEl) {
            const formInstance = selectEl.closest('.pet-profile-form-instance');
            const banner = formInstance.querySelector('.vaccineInfoBanner');
            const txt = formInstance.querySelector('.vaccineRecommendationText');
            if(scheduleSpecs[selectEl.value]) {
                txt.innerText = scheduleSpecs[selectEl.value];
                banner.style.display = "block";
                handleDateChange(formInstance.querySelector('.vaccineDate'));
            }
        }

        function handleDateChange(dateInputEl) {
            if(!dateInputEl.value) return;
            const formInstance = dateInputEl.closest('.pet-profile-form-instance');
            const species = formInstance.querySelector('.petSpecies').value;
            const expiryInput = formInstance.querySelector('.vaccineExpiry');

            const adminDate = new Date(dateInputEl.value);
            const gapYears = (species === 'rabbit') ? 1 : 3;
            adminDate.setFullYear(adminDate.getFullYear() + gapYears);
            expiryInput.value = adminDate.toISOString().split('T')[0];
        }

        function toggleBoosterForm(btn) {
            const card = btn.closest('.registered-pet-card');
            const formSlot = card.querySelector('.booster-form-slot');
            formSlot.style.display = (formSlot.style.display === 'none' || formSlot.style.display === '') ? 'block' : 'none';
        }

        async function saveCardEdits(btn) {
            const card = btn.closest('.registered-pet-card');
            const petId = card.getAttribute('data-id');
            if (!currentUserId || !petId) return;

            const updatedName = card.querySelector('.view-petName').innerText.trim();
            const log1 = card.querySelector('.view-healthLog1').innerText.trim();
            const log2 = card.querySelector('.view-healthLog2').innerText.trim();

            if (!updatedName) {
                alert("Companion's name cannot be left empty.");
                return;
            }

            try {
                await db.collection("users").doc(currentUserId).collection("pets").doc(petId).update({
                    petName: updatedName,
                    healthLogs: [log1, log2],
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert(`Secure registry records updated successfully!`);
            } catch (error) {
                console.error(error);
                alert("Failed to synchronize updates with the cloud.");
            }
        }

        async function deletePetProfile(btn) {
            const card = btn.closest('.registered-pet-card');
            const petId = card.getAttribute('data-id');
            const petName = card.querySelector('.view-petName').innerText;
            if (!currentUserId || !petId) return;

            const securityCheck = confirm(`Are you absolutely sure you want to remove ${petName}'s profile file permanently?`);
            if (!securityCheck) return;

            try {
                await db.collection("users").doc(currentUserId).collection("pets").doc(petId).delete();
                alert("Profile file deleted safely.");
            } catch (error) { alert("Failed to delete record."); }
        }

        document.getElementById('dash-logout-btn').addEventListener('click', async () => {
            try { await auth.signOut(); } catch (error) { console.error(error); }
        });
      
        let mouse = { x: null, y: null, radius: 250 };
        function initBackgroundOrganicPulse() {
            const canvas = document.getElementById('neuralCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (particles.length === 0) { init(); }
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 12 + 8; 
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.005;
                    this.opacity = Math.random() * 0.4 + 0.2;
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.strokeStyle = `rgba(74, 222, 128, ${this.opacity})`;
                    ctx.fillStyle = `rgba(74, 222, 128, ${this.opacity * 0.3})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.quadraticCurveTo(this.size, 0, 0, this.size);
                    ctx.quadraticCurveTo(-this.size, 0, 0, -this.size);
                    ctx.fill();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(0, this.size);
                    ctx.stroke();
                    ctx.restore();
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < 60; i++) particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = p.x - mouse.x;
                        let dy = p.y - mouse.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < mouse.radius) {
                            ctx.strokeStyle = `rgba(74, 222, 128, ${0.3 * (1 - dist/mouse.radius)})`;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => { mouse.x = e.clientX + window.scrollX; mouse.y = e.clientY + window.scrollY; });
            window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });
            resize();
            animate();
        }
    </script>
    <div id="footer-placeholder"></div>
