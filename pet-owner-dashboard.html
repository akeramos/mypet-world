<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mypet-world | Pet Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/first.png">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>  
    
    <script>
        async function includeHTML(placeholderId, filename) {
            try {
                const response = await fetch(filename);
                if (response.ok) {
                    document.getElementById(placeholderId).innerHTML = await response.text();
                } else {
                    console.error(`Failed to load ${filename}: ${response.statusText}`);
                }
            } catch (error) {
                console.error(`Error fetching ${filename}:`, error);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Cloned exactly from index layout promise map array
            await Promise.all([
                includeHTML('header-placeholder', 'header.html'),
                includeHTML('services-grid-placeholder', 'services.html'),
                includeHTML('services2-grid-placeholder', 'services2.html'),
                includeHTML('third-column-placeholder', 'thirdColumn.html'),
                includeHTML('footer-placeholder', 'footer.html')
            ]);
            
            // Fires your layout completion listener hooks safely
            window.dispatchEvent(new Event('ComponentsLoaded'));
            
            initBackgroundOrganicPulse();
        });
    </script>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>

    <div id="header-placeholder"></div>
    
    <div class="content-container">
        <main>
            
            <div class="glass-card" style="margin-bottom: 32px; text-align: left; background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);">
                <h2 style="margin-top:0; font-size: 1.8rem; font-weight: 800; color: #ffffff; letter-spacing: -0.5px;">Welcome back, <span id="dash-username" style="color: #4ade80;">Loading...</span>! 🐾</h2>
                <p style="font-size: 1.1rem; color: #cbd5e1; margin: 8px 0;"><strong>Account Type:</strong> <span id="dash-role" style="color: #4ade80; font-weight: 600;">Pet Owner</span></p>
                <p style="font-size: 1.1rem; color: #94a3b8; margin: 8px 0; line-height: 1.7;"><strong>Registered Email:</strong> <span id="dash-email">...</span></p>
                <h1 style="font-size: 1.5rem; font-weight: 700; color: #ffffff; margin-top: 24px; margin-bottom: 0;">Pet Owner Dashboard Workspace</h1>
            </div>

            <div id="services-grid-placeholder"></div>
            <div id="services2-grid-placeholder"></div>
            <div id="third-column-placeholder"></div>
        </main>        
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // Initialize your Firebase configurations
        const firebaseConfig = {
            apiKey: "AIzaSyAwbT7Tb1uh7XySfPjqvpit-A-OpuZ9wrw",
            authDomain: "mypet-worlds.firebaseapp.com",
            projectId: "mypet-worlds",
            storageBucket: "mypet-worlds.firebasestorage.app",
            messagingSenderId: "223873016606",
            appId: "1:223873016606:web:b228b11e349e9ee85c9f0f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🔒 Security Guard: Kick unauthenticated users back to login page
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "account.html";
                return;
            }

            try {
                const userDoc = await db.collection("users").doc(user.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    
                    const rawUsername = userData.username || userData.displayName || "Pet Owner";
                    const rawEmail = userData.email || user.email;
                    const rawRole = userData.profileType || userData.profile_type || "pet_owner";
                    const cleanRoleDisplay = rawRole.replace('_', ' ').replace('-', ' ').toUpperCase();
                    
                    if (document.getElementById('dash-username')) {
                        document.getElementById('dash-username').innerText = rawUsername;
                    }
                    if (document.getElementById('dash-email')) {
                        document.getElementById('dash-email').innerText = rawEmail;
                    }
                    if (document.getElementById('dash-role')) {
                        document.getElementById('dash-role').innerText = cleanRoleDisplay;
                    }
                }
            } catch (error) {
                console.error("Error loading dashboard profile metrics:", error);
            }
        });
      
        // Particle Background Logic Cloned Exactly from index
        let mouse = { x: null, y: null, radius: 250 };

        function initBackgroundOrganicPulse() {
            const canvas = document.getElementById('neuralCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if (particles.length === 0) {
                    init();
                } else {
                    particles.forEach(p => {
                        if (p.x > canvas.width) p.x = Math.random() * canvas.width;
                        if (p.y > canvas.height) p.y = Math.random() * canvas.height;
                    });
                }
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 12 + 8; 
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.005;
                    this.opacity = Math.random() * 0.4 + 0.2;
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.strokeStyle = `rgba(74, 222, 128, ${this.opacity})`;
                    ctx.fillStyle = `rgba(74, 222, 128, ${this.opacity * 0.3})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.quadraticCurveTo(this.size, 0, 0, this.size);
                    ctx.quadraticCurveTo(-this.size, 0, 0, -this.size);
                    ctx.fill();
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(0, this.size);
                    ctx.stroke();
                    ctx.restore();
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotationSpeed;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
            }

            function init() {
                particles = [];
                for (let i = 0; i < 60; i++) particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = p.x - mouse.x;
                        let dy = p.y - mouse.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < mouse.radius) {
                            ctx.strokeStyle = `rgba(74, 222, 128, ${0.3 * (1 - dist/mouse.radius)})`;
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX + window.scrollX;
                mouse.y = e.clientY + window.scrollY;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            resize();
            animate();
        }
    </script>
